name: Build and Deploy Nostr Relay

on:
  # Manual trigger so a website-only image update (published by the separate
  # nostrarabia-website CI) can be pulled onto the server without a code change
  # to this repo. The deploy job below also runs on workflow_dispatch.
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      # Fail the build (and therefore skip deploy) if the Caddyfile is invalid, so
      # a config typo can never reach the server and take Caddy - and with it the
      # relay and media hosts - down. The server has no other guard against this.
      - name: Validate Caddyfile
        run: |
          docker run --rm --entrypoint caddy \
            -v "$GITHUB_WORKSPACE/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine validate --config /etc/caddy/Caddyfile --adapter caddyfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push relay image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@55dabf81b49d4120609345970c91507e2d734799 # v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            
            # Create and navigate to deploy directory
            mkdir -p /home/nostrarabia/nostr-relay
            cd /home/nostrarabia/nostr-relay

            # Clone or update repo
            if [ ! -d .git ]; then
              # Remove any existing files if directory exists but no git repo
              rm -rf * .[!.]* 2>/dev/null || true
              git clone https://github.com/nostrarabia/nostrarabiarelay.git .
            else
              git remote set-url origin https://github.com/nostrarabia/nostrarabiarelay.git
              git fetch origin
              git reset --hard origin/main
              git pull origin main
            fi

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Set environment variables for docker compose
            export BLOSSOM_ADMIN_PASSWORD="${{ secrets.BLOSSOM_ADMIN_PASSWORD }}"

            # Pull images from GHCR (relay + website built by CI)
            # Base images (caddy, blossom) rarely change and will use cached versions
            docker compose pull nostr-relay website

            # Stop and remove old nginx/certbot containers (migrated to Caddy)
            echo "Stopping old nginx/certbot containers..."
            docker stop nginx-proxy certbot 2>/dev/null || true
            docker rm nginx-proxy certbot 2>/dev/null || true

            # Remove old volumes (optional - keeps old certs if you want to migrate)
            # docker volume rm nostr-relay_certbot-conf nostr-relay_certbot-www 2>/dev/null || true

            # Clean up old nginx config files
            # Keep nginx/html for static files served by Caddy
            echo "Cleaning up old nginx config files..."
            rm -rf ./nginx/conf.d ./nginx/conf.d-http-only ./nginx/conf.d-backup ./nginx/ssl 2>/dev/null || true

            # Start all services (Caddy handles SSL automatically)
            echo "Starting services..."
            docker compose up -d --remove-orphans

            # Reload Caddy config so bind-mounted Caddyfile changes take effect
            # (docker compose up doesn't recreate a container when only the
            # bind-mounted file changes; restart ensures the new config is loaded)
            echo "Restarting Caddy to apply config changes..."
            docker restart caddy-proxy

            # Wait for Caddy to obtain SSL certificates and start serving
            echo "Waiting for Caddy to obtain SSL certificates..."
            echo "This may take 30-60 seconds on first deployment."
            sleep 30

            # Verify Caddy is running
            if ! docker compose ps caddy | grep -q "Up"; then
              echo "Caddy failed to start!"
              docker compose logs caddy
              exit 1
            fi

            echo "Deployment complete! Caddy has automatically obtained SSL certificates."
            echo "Services are now running with HTTPS at:"
            echo "  - https://nostrarabia.com"
            echo "  - https://relay.nostrarabia.com (wss://)"
            echo "  - https://media.nostrarabia.com"
